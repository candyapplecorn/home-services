transcription:
  model: medium.en
  whisper_cli: whisper-cli
  whisper_models_dir: ~/.cache/whisper-cpp
  keep_recordings: false
  recording_retention_hours: 24
  split_on_word: true
  # Default whisper-cli is 0.6; lower keeps quiet/pause-heavy speech (walking around room)
  no_speech_threshold: 0.35
  logprob_threshold: -1.0
  # Warn when transcript density suggests dropped 30s windows
  min_chars_per_minute: 200
  # Whisper sometimes appends/prepends these short hallucinations near silence.
  edge_hallucinations:
    - you
  # If audio/transcription gets stuck, the next hotkey after this delay resets processing.
  processing_timeout_seconds: 30
  # Bound PortAudio shutdown/WAV flush so memory pressure cannot leave hotkeys wedged.
  recording_stop_timeout_seconds: 15
  # Keep whisper.cpp bounded under memory pressure.
  threads: 4
  processors: 1
  metal: true
  max_audio_minutes: 10
  # Reliability: retry once with the same model, then try the smaller fallback model.
  retry_count: 1
  retry_with_smaller_model: true
  fallback_model: small.en

routing:
  # Use clipboard paste above this length (typing long text is slow/unreliable)
  max_typing_chars: 500

editor:
  preferred:
    - WebStorm
    - Rider
    - TextEdit

hotkeys:
  insert: "cmd+alt+ctrl+d"
  review: "cmd+alt+ctrl+r"
  clean: "cmd+alt+ctrl+c"

audio:
  sample_rate: 16000
  channels: 1
  # Optional: set to a device index or exact device name if macOS picks the wrong input.
  # List devices with: python -m sounddevice
  device:
